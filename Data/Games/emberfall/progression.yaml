# Emberfall progression section (binds to ProgressionConfig).
pools:
  - id: experience
    curve: { kind: Linear, xpPerLevel: 100 }
    startingLevel: 1

skills:
  - id: pyromancy
    description: Formal training in fire magic.
    unlocksAbilityId: fireball
    requiredPoolId: experience
    requiredLevel: 2
  - id: toughness
    description: Hard living, harder skin.
    modifiesAttributeId: vitality
    modifierAmount: 2

startingAttributes:
  vitality: 5
  speed: 5

xpAwardRules:
  - onEvent: MonsterDefeated
    poolId: experience
    amount: 25

attributeDerivations:
  - attributeId: vitality
    derivedStat: HealthMax
    perPoint: 10
    base: 50

# Catalog membership stays the cast gate; skills grant extras rather than gating everything.
requireSkillToCastAbilities: false
