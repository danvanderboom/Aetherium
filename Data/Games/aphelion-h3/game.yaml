# Aphelion Prime — the H3 (spherical) sci-fi sample world.
#
# The parallel, planet-scale companion to the square Aphelion station-crawler: instead of a
# hibernating mega-station, this is the whole world the Aphelion crew has been orbiting —
# rendered as a single H3 sphere (docs/h3-topology.md, docs/design/h3-sphere-worldgen.md).
# The square Aphelion bundle is unchanged; this is a switchable alternative, not a replacement.
#
# The map is a shell of H3 cells at resolution 4 (~288,122 cells): a body-agnostic hex+pentagon
# tiling of a sphere, procedurally terraformed by the sphere-aware H3TerrainGenerator (two 3-D
# noise fields — elevation + moisture — sampled over each cell's centre unit vector, so there is
# no map edge, no date-line seam, and no pole singularity). ~288k cells is roughly twice the
# 384² Overworld and is deliberately sized to host a planetary economy: many settlements, trade
# routes, and transport networks with real distance between them (see the design doc).
#
# Slice-1 scope: terrain + biomes + a light creature population. Sphere-native settlements, roads,
# rivers, transit, and markets — plus player-relative perception on the sphere — are the phased
# roadmap in docs/design/h3-sphere-worldgen.md.
id: aphelion-h3
name: Aphelion Prime
version: 0.1.0
description: The planet the Aphelion crew orbits, rendered as a whole H3 sphere — a resolution-4 hex-tiled world of oceans, deserts, forests, hills, and mountains, sized for a living economy.
tags: [scifi, openworld, planet, h3, sample, daylight]

world:
  # The sphere-aware terrain generator. "h3-terrain" resolves to the Outdoor pass template; the
  # H3TerrainGenerator enumerates the whole res-4 shell and classifies each cell from 3-D noise.
  generatorType: h3-terrain
  # H3 is a sphere, not a rectangle — width/height are nominal and ignored by the generator, which
  # sizes the world by h3Resolution. depth is the number of vertical levels (surface only here).
  size: { width: 256, height: 256, depth: 1 }
  # The tiling. Movement, FOV, reach, and facing all resolve on H3 hexagons + 12 pentagons.
  topology: h3
  maxPlayers: 40
  generatorParameters:
    seed: 20260718        # fixed for reproducible dev planets; remove for a random world
    h3Resolution: 4       # ~288,122 cells. Lower it (3 ≈ 41k, 2 ≈ 5.9k) for a faster smaller planet.
    # Feature scale on the unit sphere (domain is a unit vector). Larger => smaller, busier features.
    elevScale: 1.7
    moistScale: 2.4
    octaves: 5
    # A light scattering of wildlife so the planet isn't empty; the population pass is bounded and
    # topology-agnostic. Raise deliberately — every roamer fans out a move delta each tick.
    enemyCount: 12

# Full 360° sight with a wide horizon so the open planet reads (range sizes the perception viewport).
player:
  vision:
    directional: false
    fieldOfView: 360
    range: 18

# A calm exploration/economy sandbox: no permadeath, nothing lost on death.
death:
  permadeath: false
  downStateEnabled: false
  dropOnDeath: None
  respawnLocation: { mode: WorldSpawn }
  xpLossPolicy: None
