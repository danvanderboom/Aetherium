name: Deploy Aetherium.Server to Azure App Service

on:
  push:
    branches: [ master ]
    paths:
      - 'Aetherium.Server/**'
      - '.github/workflows/deploy-server.yml'

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Aetherium.sln

      - name: Build
        run: dotnet build Aetherium.Server/Aetherium.Server.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Aetherium.Server/Aetherium.Server.csproj --configuration Release --output ${{ github.workspace }}/publish --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish


