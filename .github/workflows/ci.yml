name: CI

# P2-1: gate every integration commit with a full-solution build + test run.
# (The dashboard sat broken for ~8 months precisely because nothing built the whole
#  solution — see docs/audits/IMPROVEMENT_PLAN.md.)
#
# Runs on windows-latest to match the development/test environment exactly (the suite
# spins Orleans TestClusters and touches Windows-only APIs in a few guarded spots), so a
# green run here means the same as a green run locally. Cost note: windows minutes bill
# at 2x; triggers are intentionally scoped to the integration branches + PRs + manual
# dispatch (not every feature-branch push). Switch `runs-on` to ubuntu-latest to halve
# the cost once the suite is confirmed green on Linux.
on:
  push:
    branches: [ develop, main, master ]
  pull_request:
    branches: [ develop, main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install both SDKs: master/main target net9.0, develop targets net10.0. The newer
      # SDK can build both, but installing both avoids any ref-pack surprises.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Aetherium.sln

      - name: Build (whole solution)
        run: dotnet build Aetherium.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test Aetherium.Test/Aetherium.Test.csproj --configuration Debug --no-build --verbosity minimal
